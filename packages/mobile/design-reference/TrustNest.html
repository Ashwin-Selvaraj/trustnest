<meta charset="UTF-8">

<title>TrustNest — Mobile Design</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #f0eee9; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }
  * { box-sizing: border-box; }
  @keyframes tn-spin { to { transform: rotate(360deg); } }
  @keyframes tn-slide-in {
    from { opacity: 0; transform: translateX(8px); }
    to { opacity: 1; transform: translateX(0); }
  }
  @keyframes tn-fade-in {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  @keyframes tn-sheet-up {
    from { transform: translateY(40px); }
    to { transform: translateY(0); }
  }
  @keyframes tn-shimmer {
    0% { background-position: -200px 0; }
    100% { background-position: 200px 0; }
  }
  textarea, input { font-family: inherit; }
  /* Tighter scrollbar look inside frames */
  ::-webkit-scrollbar { width: 0; height: 0; }
</style>
</head>

            <div data-screen-label="B Property Detail · p2" style={{ height: '100%' }}>
              <PropertyDetailScreen propertyId="p2" />
            </div>
          </StaticFrame>
        </DCArtboard>
        <DCArtboard id="my-listings" label="C · My Listings (owner)" width={FW} height={FH}>
          <StaticFrame>
            <div data-screen-label="C My Listings · populated" style={{ height: '100%' }}>
              <MyListingsArtboardWrapper />
            </div>
          </StaticFrame>
        </DCArtboard>
        <DCArtboard id="my-listings-empty" label="C · My Listings — empty" width={FW} height={FH}>
          <StaticFrame>
            <div data-screen-label="C My Listings · empty" style={{ height: '100%' }}>
              <MyListingsEmptyArtboardWrapper />
            </div>
          </StaticFrame>
        </DCArtboard>
        <DCArtboard id="add-property" label="D · Add Property — empty" width={FW} height={FH}>
          <StaticFrame>
            <div data-screen-label="D Add Property · empty" style={{ height: '100%' }}>
              <AddPropertyScreen kycVerified />
            </div>
          </StaticFrame>
        </DCArtboard>
        <DCArtboard id="add-property-kycgate" label="D · Add Property — KYC gate" width={FW} height={FH}>
          <StaticFrame>
            <div data-screen-label="D Add Property · kyc gate" style={{ height: '100%' }}>
              <AddPropertyScreen kycVerified={false} />
            </div>
          </StaticFrame>
        </DCArtboard>
        <DCArtboard id="property-owner" label="E · Property detail (owner)" width={FW} height={FH}>
          <StaticFrame>
            <div data-screen-label="E Property Detail · owner" style={{ height: '100%' }}>
              <PropertyDetailOwnerScreen propertyId="p1" />
            </div>
          </StaticFrame>
        </DCArtboard>
        <DCArtboard id="interests" label="F · Interest requests" width={FW} height={FH}>
          <StaticFrame>
            <div data-screen-label="F Interest Requests" style={{ height: '100%' }}>
              <InterestRequestsScreen propertyId="p1" />
            </div>
          </StaticFrame>
        </DCArtboard>
        <DCArtboard id="my-interests" label="G · My Interests (tenant)" width={FW} height={FH}>
          <StaticFrame>
            <div data-screen-label="G My Interests · populated" style={{ height: '100%' }}>
              <MyInterestsArtboardWrapper />
            </div>
          </StaticFrame>
        </DCArtboard>
        <DCArtboard id="notifications" label="Tab 3 · Notifications" width={FW} height={FH}>
          <StaticFrame>
            <div data-screen-label="Tab 3 Notifications" style={{ height: '100%' }}>
              <NotificationsScreen />
            </div>
          </StaticFrame>
        </DCArtboard>
        <DCArtboard id="kyc-gate-interest" label="Modal · KYC gate (interest)" width={FW} height={FH}>
          <StaticFrame>
            <div data-screen-label="Modal · KYC gate interest" style={{ height: '100%' }}>
              <PropertyDetailScreen propertyId="p1" kycState="pending" />
              <KycGateOverlayForPreview mode="interest" />
            </div>
          </StaticFrame>
        </DCArtboard>
      </DCSection>

      <DCSection id="brand" title="Brand & tokens" subtitle="Color tokens, type ramp, and the visual rules behind every screen.">
        <DCArtboard id="palette" label="Colour palette" width={620} height={460}>
          <PaletteSwatches />
        </DCArtboard>
        <DCArtboard id="type" label="Type ramp" width={520} height={520}>
          <TypeRamp />
        </DCArtboard>
        <DCArtboard id="identity" label="Identity" width={420} height={460}>
          <IdentityCard />
        </DCArtboard>
      </DCSection>

      <DCPostIt top={0} left={460} width={240} rotate={-3}>
        Two roles, one product: the tenant flow is the default. Toggle viewerRole on Detail screens to see owner-side actions.
      </DCPostIt>
      <DCPostIt top={20} right={40} width={220} rotate={2}>
        The word <b>"blockchain"</b> appears nowhere user-facing — every reference is "secure escrow."
      </DCPostIt>
    </DesignCanvas>
  );
}

// ─── helpers for component showcase ─────────────────────────
function MyListingsArtboardWrapper() {
  return <BrowseScreen forceRole="owner" initialSegment="mine" />;
}
function MyListingsEmptyArtboardWrapper() {
  return <BrowseScreen forceRole="owner" initialSegment="mine" bodyState="empty" />;
}
function MyInterestsArtboardWrapper() {
  return <BrowseScreen forceRole="tenant" initialSegment="interests" />;
}
function KycGateOverlayForPreview({ mode = 'interest' }) {
  return (
    <div style={{ position: 'absolute', inset: 0, pointerEvents: 'none' }}>
      <KycGateModal open onClose={() => {}} onCompleteKyc={() => {}} mode={mode} />
    </div>
  );
}
function ComponentShowcase({ title, children }) {
  return (
    <div style={{
      width: '100%', height: '100%', padding: 28,
      background: '#fff', overflow: 'auto',
      display: 'flex', flexDirection: 'column', gap: 16,
      fontFamily: window.TN.font.family,
    }}>
      <div style={{ fontSize: 13, fontWeight: 600, color: '#6B7280', textTransform: 'uppercase', letterSpacing: 0.6 }}>{title}</div>
      {children}
    </div>
  );
}
function Row({ label, children }) {
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
      {label && <div style={{ fontSize: 11, fontWeight: 500, color: '#9CA3AF', textTransform: 'uppercase', letterSpacing: 0.4 }}>{label}</div>}
      <div style={{ display: 'flex', gap: 10, flexWrap: 'wrap', alignItems: 'center' }}>{children}</div>
    </div>
  );
}
function SubLabel({ children }) {
  return <div style={{ fontSize: 11, fontWeight: 500, color: '#9CA3AF', textTransform: 'uppercase', letterSpacing: 0.4, marginTop: 4 }}>{children}</div>;
}

// ─── palette / type / identity panels ───────────────────────
function PaletteSwatches() {
  const groups = [
    { name: 'Primary', items: [
      ['Primary', '#2563EB', '#fff'],
      ['Primary Light', '#EFF6FF', '#1E40AF'],
    ]},
    { name: 'Neutral', items: [
      ['Text Primary', '#111827', '#fff'],
      ['Text Secondary', '#6B7280', '#fff'],
      ['Text Disabled', '#9CA3AF', '#fff'],
      ['Border', '#E5E7EB', '#374151'],
      ['Surface', '#F9FAFB', '#374151'],
    ]},
    { name: 'Status', items: [
      ['Success', '#16A34A', '#fff'],
      ['Warning', '#D97706', '#fff'],
      ['Destructive', '#DC2626', '#fff'],
    ]},
  ];
  return (
    <div style={{ padding: 28, background: '#fff', height: '100%', overflow: 'auto', fontFamily: window.TN.font.family }}>
      <div style={{ fontSize: 13, fontWeight: 600, color: '#6B7280', textTransform: 'uppercase', letterSpacing: 0.6, marginBottom: 18 }}>Palette</div>
      {groups.map((g) => (
        <div key={g.name} style={{ marginBottom: 22 }}>
          <div style={{ fontSize: 11, fontWeight: 500, color: '#9CA3AF', textTransform: 'uppercase', letterSpacing: 0.4, marginBottom: 8 }}>{g.name}</div>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(150px, 1fr))', gap: 8 }}>
            {g.items.map(([name, hex, fg]) => (
              <div key={hex} style={{ background: hex, color: fg, padding: '14px 14px 12px', borderRadius: 10, border: hex === '#FFFFFF' || hex === '#F9FAFB' ? '1px solid #E5E7EB' : 'none' }}>
                <div style={{ fontSize: 13, fontWeight: 600 }}>{name}</div>
                <div style={{ fontSize: 11, opacity: 0.85, marginTop: 2, fontFamily: 'ui-monospace, "SF Mono", monospace' }}>{hex}</div>
              </div>
            ))}
          </div>
        </div>
      ))}
    </div>
  );
}

function TypeRamp() {
  const sizes = [
    [30, 700, 'Display · 30/700', 'TrustNest'],
    [24, 700, 'Heading 1 · 24/700', 'Enter OTP'],
    [20, 700, 'Heading 2 · 20/700', 'Payment Confirmed'],
    [17, 600, 'Body large · 17/600', 'Pay Security Deposit'],
    [15, 400, 'Body · 15/400', '12 MG Road, Indiranagar, Bengaluru'],
    [13, 500, 'Caption · 13/500', 'Property Address'],
    [11, 500, 'Micro · 11/500', 'PENDING DEPOSIT'],
  ];
  return (
    <div style={{ padding: 28, background: '#fff', height: '100%', fontFamily: window.TN.font.family }}>
      <div style={{ fontSize: 13, fontWeight: 600, color: '#6B7280', textTransform: 'uppercase', letterSpacing: 0.6, marginBottom: 22 }}>Type ramp</div>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 18 }}>
        {sizes.map(([sz, w, label, sample]) => (
          <div key={label}>
            <div style={{ fontSize: 11, color: '#9CA3AF', textTransform: 'uppercase', letterSpacing: 0.4, marginBottom: 4, fontFamily: 'ui-monospace, "SF Mono", monospace' }}>{label}</div>
            <div style={{ fontSize: sz, fontWeight: w, color: '#111827', letterSpacing: sz > 20 ? -0.5 : -0.2, lineHeight: 1.25 }}>{sample}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

function IdentityCard() {
  return (
    <div style={{
      padding: 28, background: '#fff', height: '100%',
      display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 18,
      fontFamily: window.TN.font.family, textAlign: 'center',
    }}>
      <Logo size={80} />
      <div>
        <div style={{ fontSize: 32, fontWeight: 700, color: '#111827', letterSpacing: -0.8 }}>TrustNest</div>
        <div style={{ fontSize: 15, color: '#6B7280', marginTop: 6, maxWidth: 280, lineHeight: 1.5 }}>
          Transparent rental agreements, powered by secure escrow.
        </div>
      </div>
      <div style={{
        display: 'inline-flex', gap: 8, padding: '8px 14px',
        background: '#EFF6FF', borderRadius: 999, fontSize: 13, fontWeight: 600, color: '#1E40AF',
      }}>
        For Indian residential rentals
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
